<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Response Approved - The Poultry Doc</title>
  <style>
    body { margin: 0; padding: 0; background: #f0f4f4; font-family: Georgia, serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); max-width: 500px; width: 90%; overflow: hidden; }
    .header { background: #01696F; padding: 32px; text-align: center; }
    .header img { max-width: 200px; display: block; margin: 0 auto 12px; }
    .header p { color: rgba(255,255,255,0.85); margin: 0; font-size: 13px; }
    .divider { background: #F5C842; height: 4px; }
    .body { padding: 40px; text-align: center; }
    .icon { font-size: 52px; color: #01696F; margin-bottom: 16px; }
    h2 { color: #01696F; margin: 0 0 12px; font-size: 22px; }
    p { color: #555; font-size: 15px; line-height: 1.6; margin: 0 0 8px; }
    .detail { background: #f0f7f7; border-radius: 6px; padding: 16px; margin-top: 20px; text-align: left; font-size: 14px; color: #444; }
    .detail strong { color: #01696F; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #f0f7f7; border-top: 4px solid #01696F; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .footer { background: #01696F; padding: 16px; text-align: center; }
    .footer p { color: rgba(255,255,255,0.7); font-size: 12px; margin: 0; }
    .footer a { color: #F5C842; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="https://thepoultrydoc.wpenginepowered.com/wp-content/uploads/2026/04/TPD-new-logo-lg-ctp-1.png" alt="The Poultry Doc">
      <p>Veterinary Consultation for Backyard Flocks</p>
    </div>
    <div class="divider"></div>
    <div class="body" id="body">
      <div class="spinner"></div>
      <p>Processing approval...</p>
    </div>
    <div class="footer">
      <p>The Poultry Doc &mdash; <a href="https://www.thepoultrydoc.com">www.thepoultrydoc.com</a></p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const approvalId = params.get('approval_id');
    const senderEmail = params.get('sender_email');
    const senderName = params.get('sender_name');
    const subject = params.get('subject');
    const draft = params.get('draft');

    const zapWebhook = 'https://hooks.zapier.com/hooks/catch/25149853/ujis74a/';

    async function sendApproval() {
      try {
        const webhookParams = new URLSearchParams({
          approval_id: approvalId || '',
          sender_email: senderEmail || '',
          sender_name: senderName || '',
          subject: subject || '',
          draft: draft || ''
        });

        await fetch(zapWebhook + '?' + webhookParams.toString(), {
          method: 'POST',
          mode: 'no-cors'
        });

        document.getElementById('body').innerHTML = `
          <div class="icon">&#10003;</div>
          <h2>Response Approved</h2>
          <p>Your approved response has been sent to the inquirer.</p>
          <div class="detail">
            <strong>Sent to:</strong> ${senderName || senderEmail} &lt;${senderEmail}&gt;<br>
            <strong>Subject:</strong> ${subject || 'Your inquiry'}
          </div>
        `;
      } catch (e) {
        document.getElementById('body').innerHTML = `
          <div class="icon" style="color:#cc0000;">&#10007;</div>
          <h2>Something went wrong</h2>
          <p>Please try again or contact the team directly.</p>
        `;
      }
    }

    if (approvalId && senderEmail) {
      sendApproval();
    } else {
      document.getElementById('body').innerHTML = '<h2>Invalid approval link.</h2>';
    }
  </script>
</body>
</html>
